<!doctype html>
<html lang="es" class="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f8fafa" />
    <meta
      name="description"
      content="Método Brújula — Plataforma profesional de Orientación Vocacional. Encontrá tu norte. Construí tu camino."
    />
    <title>Método Brújula · Encontrá tu norte</title>
    <script>
      // Aplica el tema antes del primer paint para evitar flash.
      try {
        var t = JSON.parse(localStorage.getItem('mb:ui') || '{}')
        var theme = (t.state && t.state.theme) || 'light'
        if (theme === 'system') {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
        }
        document.documentElement.classList.remove('light', 'dark')
        document.documentElement.classList.add(theme)
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
